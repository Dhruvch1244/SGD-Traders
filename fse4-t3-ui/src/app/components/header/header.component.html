<div class="header">
  <div class="logo" (click)="navigateToHome()">SDG Markets</div>

  <div class="header-buttons">
    <!-- Updated Add Money Button -->
    <div class="wallet-container">
      <button
        mat-raised-button
        color="primary"
        class="animated-button"
        (click)="toggleAddMoneyForm()"
      >
        <mat-icon class="icon blue">account_balance_wallet</mat-icon>
        <span>Add Money</span>
        <span class="wallet-balance">{{ walletBalance$ | async | currency : "USD" }}</span>
      </button>

      <!-- Add Money Form -->
      <div class="add-money-form-container" *ngIf="showAddMoneyForm">
        <form (ngSubmit)="addMoney()" class="add-money-form">
          <mat-form-field appearance="outline" class="amount-input">
            <h2>Add Money</h2>
            <mat-label>Amount</mat-label>
            <input
              matInput
              type="number"
              placeholder="Enter amount"
              [(ngModel)]="amountToAdd"
              name="amount"
              required
              min="1"
            />
          </mat-form-field>
          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="!amountToAdd || amountToAdd <= 0"
          >
            Confirm
          </button>
          <button mat-button type="button" (click)="toggleAddMoneyForm()">
            Cancel
          </button>
        </form>
      </div>
    </div>

    <button
      mat-raised-button
      color="accent"
      class="animated-button"
      (click)="navigateTo('/trade')"
    >
      <mat-icon class="icon green">shopping_cart</mat-icon> Buy
    </button>
    <button
      mat-raised-button
      color="warn"
      class="animated-button"
      (click)="navigateToSell()"
    >
      <mat-icon class="icon red">sell</mat-icon> Sell
    </button>
  </div>

  <div class="profile-section" (click)="toggleProfileMenu()">
    <mat-icon class="icon white animated-icon">account_circle</mat-icon>
    <span class="profile-name">{{ clientName }}</span>
    <mat-icon
      class="icon white expand-icon"
      [class.expanded]="isProfileMenuOpen"
      >expand_more</mat-icon>
    >

    <div class="profile-menu" *ngIf="isProfileMenuOpen">
      <button mat-button (click)="navigateTo('/profile')">
        <mat-icon class="icon">account_circle</mat-icon>
        My Profile
      </button>

      <a mat-button href="/preferences/update">
        <span style="display: flex; align-items: center;">
          <mat-icon class="icon" style="vertical-align: middle;">settings</mat-icon>
          <span style="margin-left: 8px;">Edit Preferences</span>
        </span>
      </a>
<!-- 
      <button mat-button (click)="changePass()">
        <mat-icon>lock</mat-icon>
        Change Password
      </button> -->

      <button mat-button (click)="generateFullReport()">
        <mat-icon>description</mat-icon>
        Generate Report
      </button>

      <button mat-button (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        Logout
      </button>
    </div>
  </div>
</div>
